# render.yaml – optional deployment config for Render
# You can also just configure this manually in the Render dashboard.
services:
  - type: web
    name: spotistat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SPOTIPY_CLIENT_ID
        sync: false        # set manually in Render dashboard
      - key: SPOTIPY_CLIENT_SECRET
        sync: false
      - key: SPOTIPY_REDIRECT_URI
        sync: false        # e.g. https://spotistat.onrender.com/callback
      - key: SECRET_KEY
        generateValue: true
