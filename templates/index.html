<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotistat – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100">

  <div class="login-card text-center p-5">
    <div class="mb-4">
      <!-- Simple SVG logo mark -->
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="30" fill="#1DB954"/>
        <path d="M15 22 Q30 14 45 22" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M18 30 Q30 23 42 30" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M21 38 Q30 33 39 38" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>

    <h1 class="display-5 fw-black mb-1">Spotistat</h1>
    <p class="text-muted mb-4">Your Spotify listening analytics, whenever you want them.</p>

    {% if error %}
      <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
    {% endif %}

    <a href="{{ auth_url }}" class="btn btn-spotify btn-lg w-100 mb-3">
      <svg class="me-2" width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.622.622 0 01.207.857zm1.223-2.722a.779.779 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.778.778 0 01-.97-.519.779.779 0 01.52-.972c3.632-1.102 8.147-.568 11.23 1.328a.779.779 0 01.257 1.072zm.105-2.835C14.69 9.08 9.375 8.908 6.2 9.857a.935.935 0 11-.543-1.79c3.632-1.102 9.675-.889 13.498 1.332a.935.935 0 01-.241 1.468z"/>
      </svg>
      Log in with Spotify
    </a>

    <p class="small text-muted mt-3">
      Spotistat only uses your account to verify your identity and display your name.<br>
      Your listening data is loaded from a stored dataset, not fetched live.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
